namespace: dolphiq\redirect\tests
actor: Tester
paths:
    tests: tests
    output: tests/_output
    support: tests/_support
    data: tests/_data
bootstrap: _bootstrap.php
settings:
    shuffle: false
    lint: true
modules:
    config:
        \craft\test\Craft:
            configFile: 'tests/_craft/config/test.php'
            entryUrl: 'https://test.craftcms.test/index.php'
            projectConfig: {}
            migrations: []
            plugins:
                - class: dolphiq\redirect\RedirectPlugin
                  handle: redirect
            cleanup: true
            transaction: true
            dbSetup:
                clean: true
                setupCraft: true
